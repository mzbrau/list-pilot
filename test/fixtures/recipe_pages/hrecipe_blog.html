<!DOCTYPE html>
<html>
<body>
<article class="h-recipe">
  <h1 class="p-name">Fixture Vegetable Gratin</h1>
  <p class="p-summary">A creamy baked vegetable dish.</p>
  <img class="u-photo" src="/images/gratin.jpg" />
  <ul>
    <li class="p-ingredient">3 zucchini, sliced</li>
    <li class="p-ingredient">1 cup cream</li>
    <li class="p-ingredient">1 cup grated cheese</li>
  </ul>
  <ol>
    <li class="e-instruction">Layer vegetables in a baking dish.</li>
    <li class="e-instruction">Pour over cream and top with cheese.</li>
    <li class="e-instruction">Bake at 190C for 35 minutes.</li>
  </ol>
</article>
</body>
</html>
