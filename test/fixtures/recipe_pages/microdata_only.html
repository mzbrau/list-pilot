<!DOCTYPE html>
<html>
<body>
<div itemscope itemtype="https://schema.org/Recipe">
  <h1 itemprop="name">Fixture Chicken Noodle Soup</h1>
  <meta itemprop="description" content="Comforting soup with vegetables and noodles." />
  <img itemprop="image" src="https://example-recipes.test/images/soup.jpg" />
  <ul>
    <li itemprop="recipeIngredient">2 chicken breasts</li>
    <li itemprop="recipeIngredient">200g egg noodles</li>
    <li itemprop="recipeIngredient">3 carrots, sliced</li>
  </ul>
  <div itemprop="recipeInstructions">
    <p itemprop="text">Simmer chicken in broth until cooked through.</p>
    <p itemprop="text">Shred chicken and return to pot with vegetables and noodles.</p>
    <p itemprop="text">Cook until noodles are tender and serve.</p>
  </div>
</div>
</body>
</html>
