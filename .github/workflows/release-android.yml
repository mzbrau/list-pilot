name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z (e.g. v1.0.0), got: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        run: |
          chmod +x tool/set_version.sh
          VERSION=$(./tool/set_version.sh "${{ github.ref_name }}")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION%%+*}" >> "$GITHUB_ENV"

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Warning: ANDROID_KEYSTORE_BASE64 not set — release APK will use debug signing and upgrades between releases will fail."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/upload-keystore.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/shop-flow-${VERSION_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shop Flow v${{ env.VERSION_NAME }}
          files: dist/shop-flow-${{ env.VERSION_NAME }}.apk
          generate_release_notes: true
          body: |
            ## Install on Android

            1. Download `shop-flow-${{ env.VERSION_NAME }}.apk` below.
            2. On your phone, allow installation from unknown sources for your browser or file manager.
            3. Open the APK and install.

            Release APKs are signed with the repository sideload keystore so in-place upgrades preserve your data. Keep patch versions below 100 (e.g. v1.0.99) to avoid Android versionCode collisions.
