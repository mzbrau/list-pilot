name: list_pilot
description: List Pilot - smart shopping list app.
publish_to: "none"
version: 1.0.0+10000

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  drift: ^2.22.1
  drift_flutter: ^0.2.0
  path_provider: ^2.1.5
  path: ^1.9.0
  sqlite3_flutter_libs: ^0.5.28
  shared_preferences: ^2.3.3
  package_info_plus: ^8.1.2
  intl: ^0.19.0
  file_saver: ^0.4.0
  image_picker: ^1.1.2
  table_calendar: ^3.1.3
  url_launcher: ^6.3.1
  http: ^1.2.2
  html: ^0.15.4
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  flutter_slidable: ^4.0.3
  flutter_inappwebview: ^6.1.5
  fl_chart: ^0.70.2
  receive_sharing_intent: ^1.8.1
  file_picker: ^8.1.7
  dir_picker: ^0.4.1
  saf_stream: ^3.0.0
  open_filex: ^4.6.0
  pdfrx: ^1.1.26

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  archive: ^4.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#1EC9B0"
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/seed_catalog.json
